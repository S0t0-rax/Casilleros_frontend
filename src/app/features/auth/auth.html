<div class="auth-container">
  <div class="auth-card glass-panel">
    
    <div class="auth-header">
      <div class="auth-logo">
        <!-- Icono simple de candado/casillero usando caracteres emoji elegantes o SVG -->
        <span>📦</span>
      </div>
      <h1 class="auth-title">BoxKeeper</h1>
      <p class="auth-subtitle">
        {{ isLoginMode() ? 'Accede a tu casillero inteligente' : 'Crea tu cuenta de cliente' }}
      </p>
    </div>

    <!-- Alerta de Error -->
    @if (errorMessage()) {
      <div class="alert alert-danger animate-fade-in">
        {{ errorMessage() }}
      </div>
    }

    <!-- Alerta de Éxito -->
    @if (successMessage()) {
      <div class="alert alert-success animate-fade-in">
        {{ successMessage() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #authForm="ngForm">
      
      <!-- Nombre Completo (Solo en modo Registro) -->
      @if (!isLoginMode()) {
        <div class="form-group animate-fade-in">
          <label class="form-label" for="fullName">Nombre Completo</label>
          <input 
            type="text" 
            id="fullName" 
            name="fullName" 
            class="form-control" 
            placeholder="Ej. Juan Pérez" 
            [(ngModel)]="fullName" 
            required>
        </div>
        
        <div class="form-group animate-fade-in">
          <label class="form-label" for="studentCode">Código de Estudiante / Registro (10 dígitos)</label>
          <input 
            type="text" 
            id="studentCode" 
            name="studentCode" 
            class="form-control" 
            placeholder="Ej. 1234567890" 
            pattern="[0-9]*"
            maxlength="10"
            [(ngModel)]="studentCode" 
            required>
        </div>
      }

      <!-- Correo Electrónico -->
      <div class="form-group">
        <label class="form-label" for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-control" 
          placeholder="ejemplo@correo.com" 
          [(ngModel)]="email" 
          required>
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="form-control" 
          placeholder="••••••••" 
          [(ngModel)]="password" 
          required>
      </div>

      <!-- Botón de Envío -->
      <button 
        type="submit" 
        class="btn-primary auth-btn" 
        [disabled]="loading()">
        @if (loading()) {
          <span>Procesando...</span>
        } @else {
          <span>{{ isLoginMode() ? 'Iniciar Sesión' : 'Registrarse' }}</span>
        }
      </button>

    </form>

    <!-- Alternador de Modos -->
    <div class="auth-toggle">
      {{ isLoginMode() ? '¿No tienes cuenta?' : '¿Ya tienes cuenta?' }}
      <button 
        type="button" 
        class="auth-toggle-link" 
        (click)="toggleMode()">
        {{ isLoginMode() ? 'Regístrate aquí' : 'Inicia sesión' }}
      </button>
    </div>

  </div>
</div>
