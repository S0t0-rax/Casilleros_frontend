<router-outlet></router-outlet>

@if (uiService.modalConfig(); as config) {
  <div class="modal-overlay" style="z-index: 9999;" (click)="uiService.closeModal()">
    <div class="modal-sheet animate-slide-up" (click)="$event.stopPropagation()" style="text-align: center;">
      <h3 class="modal-title" style="margin-bottom: 16px;">
        {{ config.type === 'alert' ? 'ℹ️ Notificación' : '⚠️ Confirmación' }}
      </h3>
      <p style="font-size: 1rem; color: var(--text-primary); margin-bottom: 24px;">
        {{ config.message }}
      </p>
      <div class="modal-footer-btns" style="display: flex; justify-content: center; gap: 12px;">
        @if (config.type === 'confirm') {
          <button class="btn-secondary" (click)="config.onCancel?.()">Cancelar</button>
        }
        <button class="btn-primary" (click)="config.onConfirm?.()">Aceptar</button>
      </div>
    </div>
  </div>
}
